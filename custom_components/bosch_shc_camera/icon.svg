<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#1a73e8"/>

  <!-- Camera body -->
  <rect x="52" y="88" width="130" height="90" rx="14" ry="14" fill="white"/>

  <!-- Lens outer ring -->
  <circle cx="117" cy="133" r="32" fill="#1a73e8"/>
  <!-- Lens inner -->
  <circle cx="117" cy="133" r="22" fill="#0d47a1"/>
  <!-- Lens reflection -->
  <circle cx="109" cy="125" r="7" fill="white" opacity="0.35"/>
  <circle cx="107" cy="123" r="3" fill="white" opacity="0.6"/>

  <!-- Viewfinder bump -->
  <rect x="155" y="76" width="24" height="20" rx="5" ry="5" fill="white"/>

  <!-- Home Assistant logo (simplified house) -->
  <g transform="translate(168, 108) scale(0.72)">
    <!-- House shape -->
    <polygon points="28,0 56,26 56,60 0,60 0,26" fill="#ff6d00"/>
    <!-- Door -->
    <rect x="19" y="38" width="18" height="22" rx="3" fill="white"/>
    <!-- Center dot -->
    <circle cx="28" cy="26" r="7" fill="white"/>
  </g>
</svg>
