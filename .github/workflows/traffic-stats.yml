name: Traffic Stats

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Capture traffic snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p stats
          DATE=$(date -u +%Y-%m-%d)

          VIEWS=$(gh api "repos/${{ github.repository }}/traffic/views")
          CLONES=$(gh api "repos/${{ github.repository }}/traffic/clones")
          REPO=$(gh api "repos/${{ github.repository }}" --jq '{stargazers_count, forks_count, watchers_count, subscribers_count, open_issues_count}')
          RELEASES=$(gh api "repos/${{ github.repository }}/releases" --jq '[.[] | {tag: .tag_name, downloads: ([.assets[]?.download_count] | add // 0), published: (.published_at | split("T")[0])}] | .[0:5]')

          SNAPSHOT=$(jq -n \
            --arg date "$DATE" \
            --argjson repo "$REPO" \
            --argjson views "$VIEWS" \
            --argjson clones "$CLONES" \
            --argjson releases "$RELEASES" \
            '{date: $date, repo: $repo, views_14d: {count: $views.count, uniques: $views.uniques}, clones_14d: {count: $clones.count, uniques: $clones.uniques}, recent_releases: $releases}')

          FILE=stats/github-traffic.json
          if [ -f "$FILE" ] && [ -s "$FILE" ]; then
            jq --argjson snap "$SNAPSHOT" '. + [$snap]' "$FILE" > "$FILE.tmp"
            mv "$FILE.tmp" "$FILE"
          else
            printf '%s\n' "[$SNAPSHOT]" | jq . > "$FILE"
          fi

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/github-traffic.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "stats: weekly traffic snapshot"
            git push
          fi
